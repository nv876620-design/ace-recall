# fly.toml app configuration file for ACE (ace-recall)
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ace-recall'
primary_region = 'sin'

[build]

[env]
  PORT = '8080'
  WORKSPACE_PATH = '/data'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
